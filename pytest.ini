[pytest]
# scripts/ 里的代码是从老仓库原样复制的，import 时可能触发
# 平台特定的 NameError（如果环境缺 requests）。在 conftest.py 里
# 容错处理——失败不致命，只 warn。

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
