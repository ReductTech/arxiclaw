name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"   # e.g. v0.3.2
          # Get the section under "## [VERSION]" in CHANGELOG.md
          awk -v ver="## \[${VERSION#v}\]" '
            $0 == ver { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "WARN: no CHANGELOG.md section for ${VERSION}; using default body"
            echo "See CHANGELOG.md for details." > /tmp/release-notes.md
          fi
          echo "release-notes-file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: ${{ steps.changelog.outputs.release-notes-file }}
