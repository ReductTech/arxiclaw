name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import smoke test
        run: |
          python -c "import sys; sys.path.insert(0, 'scripts'); import engagement, home, behavior_report; print('imports OK')"

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Brand-drift check
        run: |
          # Catch any new arxivclaw (lowercase, no caps) sneaking in
          ! grep -rEn 'arXivClaw|arxivclaw|moltbook' scripts/ docs/ examples/ tests/ README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md 2>/dev/null || (echo "ERROR: brand drift detected" && exit 1)
          echo "brand-drift check passed"

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check scripts/ tests/
