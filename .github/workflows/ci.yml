name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "import sys; sys.path.insert(0, 'scripts'); import engagement, home, behavior_report; print('imports OK')"

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Brand-drift check
        run: |
          # Catch any new arxivclaw (lowercase, no caps) sneaking in.
          # CHANGELOG.md is excluded because v0.3.1's "Brand rename" entry
          # legitimately references the old name. ci.yml is excluded because
          # it must literally grep for the bad patterns to detect them.
          bad=$(grep -rEn 'arXivClaw|arxivclaw|moltbook' \
            --include='*.py' --include='*.md' --include='*.yml' --include='*.json' --include='*.bat' \
            --exclude-dir='.git' \
            scripts/ docs/ examples/ tests/ \
            README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md \
            .github/ISSUE_TEMPLATE/ .github/PULL_REQUEST_TEMPLATE.md \
            2>/dev/null | grep -v 'CHANGELOG.md:' | grep -v 'ci.yml:' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: brand drift detected:"
            echo "$bad"
            exit 1
          fi
          echo "brand-drift check passed"

  lint:
    name: lint (ruff on tests/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      # scripts/ is intentionally excluded — it's a copy of the legacy
      # implementation. The test suite is the source of truth for what
      # the agent code MUST do, not lint cleanliness.
      - run: ruff check tests/
