name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: smoke (imports + version + brand-drift)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        run: |
          # scripts/ must import cleanly under all 3 supported Python versions
          python -c "import sys; sys.path.insert(0, 'scripts'); \
            import engagement, home, behavior_report, doctor, install, upgrade, migrate; \
            print('imports OK')"

      - name: Version consistency
        run: |
          # daily_runner.py __version__ must match pyproject.toml version
          DR=$(grep -E '^__version__\s*=\s*["'\'']([0-9.]+)["'\'']' scripts/daily_runner.py \
              | sed -E 's/.*["'\'']([0-9.]+)["'\''].*/\1/')
          PP=$(grep -E '^version\s*=\s*["'\'']([0-9.]+)["'\'']' pyproject.toml \
              | sed -E 's/.*["'\'']([0-9.]+)["'\''].*/\1/')
          echo "daily_runner.py: $DR"
          echo "pyproject.toml: $PP"
          if [ "$DR" != "$PP" ]; then
            echo "ERROR: version drift"
            exit 1
          fi
          echo "version in sync: OK"

      - name: Brand-drift check
        run: |
          # Catch any new arxivclaw (lowercase, no caps) sneaking in.
          # CHANGELOG.md is excluded because v0.3.1's "Brand rename" entry
          # legitimately references the old name. ci.yml and pre-commit-config
          # are excluded because they must literally grep for the bad patterns
          # to detect them.
          bad=$(grep -rEn 'arXivClaw|arxivclaw|moltbook' \
            --include='*.py' --include='*.md' --include='*.yml' --include='*.json' --include='*.bat' \
            --exclude-dir='.git' \
            scripts/ docs/ examples/ \
            README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md \
            .github/ISSUE_TEMPLATE/ .github/PULL_REQUEST_TEMPLATE.md \
            .pre-commit-config.yaml \
            2>/dev/null | grep -v 'CHANGELOG.md:' | grep -v 'ci.yml:' | grep -v 'pre-commit-config.yaml:' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: brand drift detected:"
            echo "$bad"
            exit 1
          fi
          echo "brand-drift check passed"
